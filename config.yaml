hotkey:
  key: ctrl+win
  mode: hold
audio:
  sample_rate: 16000
  channels: 1
  silence_threshold: 0.02
  silence_duration: 1.5
whisper:
  model_name: tiny
  language: en
  device: cpu
  # To use GPU: 1) Install CUDA-enabled PyTorch 2) Change device to: cuda
  # Available models: tiny, base, small, medium, large
ollama:
  enabled: true
  base_url: http://localhost:11434
  model: orca-mini
  timeout: 10
injection:
  method: clipboard
  restore_clipboard: true
tts:
  hotkey: ctrl+win+r
  voice: en-US-GuyNeural
  rate: "+0%"
  volume: "+0%"
_setup_complete: true
